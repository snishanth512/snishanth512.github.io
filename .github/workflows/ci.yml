name: Quality Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

  lint-html:
    name: HTML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate HTML
        uses: htmlhint/htmlhint-action@v2
        with:
          addresses: 'index.html'

  check-links:
    name: Link Checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check Links
        uses: lycheeverse/lychee-action@v1.9.0
        with:
          args: --verbose --no-progress "**/*.md" "**/*.html"
